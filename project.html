        /* --- 1. RESET & SETUP --- */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html {

            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: #000; color: #fff; overflow-x: hidden;
        }

        /* ROLLING TEXT CSS */
        .rolling-text {
            display: inline-block;
            overflow: hidden;
            position: relative;
            height: 1.2em;
            line-height: 1.2em;
            vertical-align: middle;
        }
        .rolling-text span {
            display: block;
            transition: transform 0.6s cubic-bezier(0.76, 0, 0.24, 1);
        }
        .rolling-text span:last-child {
            position: absolute;
            top: 100%; left: 0; width: 100%;
        }
        .rolling-text:hover span {
            transform: translateY(-100%);
        }

        /* --- 2. HEADER --- */
        .main-header {
            position: fixed; top: 0; left: 0; width: 100%;
            display: flex; justify-content: space-between; align-items: center;
            padding: 40px 50px; z-index: 2000;
        }
        .back-btn { 
            color: #fff; text-decoration: none; font-size: 0.75rem; 
            font-weight: 700; letter-spacing: 1px; opacity: 0.6; transition: 0.3s;
        }
        .back-btn:hover { opacity: 1; }

        /* --- 3. HERO SECTION --- */
        .hero { 
            position: relative; width: 100%; height: 100vh; 
            display: flex; align-items: flex-end; justify-content: space-between;
            padding: 60px 50px; overflow: hidden;
            background-size: cover; background-position: center; background-repeat: no-repeat;
        }
        .hero::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.3); z-index: 1;
        }
        #bg-video { position: absolute; top: 50%; left: 50%; min-width: 100%; min-height: 100%; transform: translate(-50%, -50%); object-fit: cover; z-index: 0; display: none; }
        
        .project-name { position: relative; z-index: 10; font-size: clamp(3rem, 10vw, 8rem); font-weight: 900; letter-spacing: -5px; text-transform: uppercase; line-height: 0.8; max-width: 50%; }
        
        /* FIX: DÀN HÀNG NGANG CHO INFO */
        .project-info-right { 
            position: relative; z-index: 10; 
            display: flex; 
            align-items: flex-end; 
            padding-bottom: 15px; 
        }
        .info-row { 
            display: flex; 
            align-items: flex-end; 
            gap: 60px; /* Khoảng cách giữa các mục */
        }
        .info-item span { display: block; font-size: 0.65rem; color: #888; text-transform: uppercase; font-weight: bold; margin-bottom: 5px; letter-spacing: 1px; }
        .info-item p { font-size: 0.9rem; font-weight: 600; letter-spacing: 0.5px; }
        
        /* FIX: NÚT CREDIT TRÔNG SANG HƠN */
        .credit-btn { 
            padding: 12px 30px; 
            border: 1px solid rgba(255,255,255,0.3); 
            background: transparent; color: #fff; 
            cursor: pointer; font-weight: 800; text-transform: uppercase; 
            letter-spacing: 2px; font-size: 0.7rem; transition: all 0.4s ease;
            height: 45px;
        }
        .credit-btn:hover { background: #fff; color: #000; border-color: #fff; }

        /* --- 4. VIDEO NỀN CỐ ĐỊNH --- */
        .fixed-video-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2; overflow: hidden; }
        #fixed-video { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.4); }
        
        /* --- 5. TAB TRƯỢT --- */
        #view-product { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100vh;
            z-index: 2500; background: rgba(0, 0, 0, 0.75); 
            backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
            transform: translateY(100%); transition: transform 0.8s cubic-bezier(0.85, 0, 0.15, 1);
            overflow-y: auto;
        }
        #view-product.active { transform: translateY(0); }
        .close-tab { position: sticky; top: 0; right: 0; width: 100%; display: flex; justify-content: flex-end; padding: 40px 50px; z-index: 2600; }
        
        /* CLOSE BTN TO VÀ ĐẬM */
        .close-btn { 
            cursor: pointer; font-size: 1rem; font-weight: 900; letter-spacing: 3px; opacity: 0.6; transition: 0.3s; 
            height: 1.4em; line-height: 1.4em;
        }

        /* --- 6. CONTENT ROWS --- */
        .product-content { padding-top: 50px; }
        .row { display: flex; align-items: center; justify-content: center; margin-bottom: 200px; gap: 80px; padding: 0 10%; opacity: 0; transform: translateY(50px); transition: all 1s ease; }
        .row:nth-child(even) { flex-direction: row-reverse; }

        .reveal { opacity: 1 !important; transform: translateY(0) !important; }

        .footer-top-line { width: 100%; height: 1px; background: rgba(255,255,255,0.1); margin-bottom: 60px; }
        .footer-content { display: grid; grid-template-columns: repeat(3, 1fr); gap: 40px; margin-bottom: 80px; }
        .f-label { display: block; font-size: 0.65rem; color: #555; font-weight: 700; letter-spacing: 2px; margin-bottom: 25px; }
        .f-links { display: flex; flex-direction: column; gap: 10px; }
        .f-links a { color: #fff; text-decoration: none; font-size: 0.8rem; font-weight: 600; opacity: 0.6; transition: 0.3s; }
        .f-links a:hover { opacity: 1; }
        .footer-column p { font-size: 0.8rem; font-weight: 600; line-height: 1.6; color: #ccc; text-transform: uppercase; }
        .footer-column.right { text-align: right; }
        .footer-bottom { text-align: center; font-size: 0.6rem; color: #333; letter-spacing: 1px; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 40px; }

            .project-info-right { align-items: flex-start; text-align: left; width: 100%; }

            .footer-content { grid-template-columns: 1fr; gap: 50px; }

            heroSection.style.backgroundImage = `url('${data.img}')`;
        }

        function openCredits() {
            viewProduct.classList.add('active');
            document.body.style.overflow = 'hidden';
            if (photoContainer.innerHTML === "") {
                renderPhotoRows(data.imgPrefix, data.count);
            }
        }

        function closeCredits() {
            viewProduct.classList.remove('active');
            document.body.style.overflow = 'auto';
        }

        function renderPhotoRows(prefix, count) {
            let html = "";
            for (let i = 1; i <= count; i++) {
                const num = i < 10 ? `0${i}` : i;
                let q = "Visual Series";
                if(data.title === "NGOAITHUONG") q = quotes.oldLove[i % 20];
                else if(data.title === "ENDLESS") q = quotes.life[i % 10];
                else if(data.title === "LOCKNLOCK") q = quotes.love[i % 10]; 
                else if(data.title === "OCEAN FLASHLIGHT") q = quotes.sea[i % 12];
                else if(data.title === "PRODUCT PHOTOGRAPHY") q = quotes.art[i % 23];
                else if(data.title === "EMPTY SCENES") q = quotes.empty[i % 17];
                else q = quotes.art[i % 2];

                let label = "PIECE"; 
                if(data.title === "OCEAN FLASHLIGHT") label = "Làn sóng";
                else if(data.title === "LOCKNLOCK") label = "LOVE";
                else if(data.title === "NGOAITHUONG") label = "Hồi ức số";
                else if(data.title === "ENDLESS") label = "Vòng lặp số";
                else if(data.title === "PRODUCT PHOTOGRAPHY") label = "Sản phẩm";
                else if(data.title === "EMPTY SCENES") label = "Chụp vội";

                html += `
                <div class="row">
                    <div class="img-box">
                        <img src="${prefix}${i}.jpg" loading="lazy">
                    </div>
                    <div class="text-box">
                        <h2>${label} ${num}</h2> 
                        <p>"${q}"</p>
                    </div>
                </div>`;
            }
            
            photoContainer.innerHTML = html;
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => { if (entry.isIntersecting) entry.target.classList.add('reveal'); });
            }, { threshold: 0.1 });
            document.querySelectorAll('.row').forEach(r => observer.observe(r));
        }
    </script>
</body>
</html>
